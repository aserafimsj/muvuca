<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MUVUCA</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --brand:#F5B301; --brand-ink:#3a2c00;
    --bg:#F6F6F3; --panel:#FFFFFF; --line:#E8E7E2;
    --ink:#2C2C2A; --muted:#77766F;
    --pos:#7AC943; --neg:#E63329; --neu:#F5A623; --duv:#3FA9F5; --bot:#B8B8B8; --pol:#111111;
    --radius:10px;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;font-size:14px;line-height:1.5}
  button{font-family:inherit;cursor:pointer}
  select,input,textarea{font-family:inherit;font-size:13px;color:var(--ink);background:var(--panel);
    border:1px solid var(--line);border-radius:8px;padding:9px 11px;outline:none;width:100%}
  select:focus,input:focus,textarea:focus{border-color:var(--brand)}
  .app{display:flex;min-height:100vh}
  .side{width:210px;flex-shrink:0;background:var(--panel);border-right:1px solid var(--line);
    padding:16px 12px;display:flex;flex-direction:column;gap:3px}
  .logo{display:flex;align-items:center;gap:9px;padding:0 6px 14px}
  .logo .tile{width:28px;height:28px;border-radius:8px;background:var(--brand);color:var(--brand-ink);
    display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px}
  .logo b{font-size:16px;font-weight:600}
  .switcher{display:flex;flex-direction:column;gap:3px;padding:9px 11px;margin-bottom:10px;
    border:1px solid var(--line);border-radius:var(--radius);background:var(--bg)}
  .switcher label{font-size:11px;color:var(--muted)}
  .switcher select{border:none;background:transparent;padding:0;font-size:13px;font-weight:600}
  .nav{display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:var(--radius);
    color:var(--muted);border:none;background:transparent;width:100%;text-align:left;font-size:14px}
  .nav:hover{background:var(--bg)}
  .nav.on{background:#FDF3D6;color:var(--brand-ink);font-weight:600}
  .nav svg{width:19px;height:19px;flex-shrink:0}
  .foot{margin-top:auto;display:flex;flex-direction:column;gap:8px;padding:12px 6px 0;border-top:1px solid var(--line)}
  .foot .who{display:flex;align-items:center;gap:9px}
  .foot .av{width:28px;height:28px;border-radius:50%;background:#E6F1FB;color:#185FA5;
    display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600}
  .linkbtn{background:none;border:none;color:var(--muted);font-size:12px;text-align:left;text-decoration:underline;padding:0}
  .main{flex:1;min-width:0;padding:22px 26px}
  .head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:18px}
  .head h1{margin:0;font-size:20px;font-weight:600}
  .head p{margin:2px 0 0;color:var(--muted);font-size:13px}
  .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 13px;border-radius:8px;
    border:1px solid var(--line);background:var(--panel);font-size:13px;width:auto}
  .btn:hover{border-color:#cfcec8}
  .btn.brand{background:var(--brand);border-color:var(--brand);color:var(--brand-ink);font-weight:600}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin-bottom:16px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 16px}
  .card .lbl{font-size:12px;color:var(--muted)}
  .card .val{font-size:26px;font-weight:600;margin-top:2px}
  .filters{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:6px}
  .filters input,.filters select{width:auto;min-width:150px}
  .row{display:flex;gap:12px;padding:14px 0;border-top:1px solid var(--line)}
  .row:last-child{border-bottom:1px solid var(--line)}
  .row .av{width:34px;height:34px;flex-shrink:0;border-radius:50%;background:var(--bg);
    display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--muted)}
  .row .body{flex:1;min-width:0}
  .meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:3px}
  .meta .who{font-size:13px;font-weight:600}
  .meta .net,.meta .prod{font-size:12px;color:var(--muted)}
  .tag{font-size:11px;color:var(--muted);border:1px solid var(--line);border-radius:5px;padding:1px 6px}
  .txt{font-size:13px;color:#4a4a46}
  .ctrl{display:flex;flex-direction:column;gap:6px;align-items:flex-end;flex-shrink:0}
  .ctrl select{width:auto;min-width:120px}
  .sentbox{display:flex;align-items:center;gap:6px}
  .dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
  .reply{margin-top:10px;display:flex;flex-direction:column;gap:8px}
  .reply textarea{min-height:64px;resize:vertical}
  .addwrap{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px 18px;margin-bottom:18px}
  .addgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:10px}
  .field{display:flex;flex-direction:column;gap:4px}
  .field span{font-size:12px;color:var(--muted)}
  .center{max-width:520px;margin:6vh auto;background:var(--panel);border:1px solid var(--line);
    border-radius:14px;padding:30px 32px}
  .center .tile{width:44px;height:44px;border-radius:11px;background:var(--brand);color:var(--brand-ink);
    display:flex;align-items:center;justify-content:center;font-weight:700;font-size:24px;margin-bottom:14px}
  .center h1{font-size:22px;margin:0 0 6px}
  .center p{color:var(--muted);margin:0 0 18px}
  .center label{display:block;font-size:13px;font-weight:600;margin:0 0 6px}
  .center .hint{font-size:12px;color:var(--muted);font-weight:400;margin-top:4px}
  .center .grp{margin-bottom:16px}
  .center .err{background:#FBECEA;color:#A3241C;border-radius:8px;padding:10px 12px;font-size:13px;margin-bottom:14px}
  .empty{text-align:center;color:var(--muted);padding:40px 0}
  .soon{background:var(--panel);border:1px dashed var(--line);border-radius:12px;padding:48px;text-align:center;color:var(--muted)}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useMemo } = React;

const LS_URL = "muvuca_supabase_url";
const LS_KEY = "muvuca_supabase_key";
function lsGet(k){ try { return localStorage.getItem(k) || ""; } catch(e){ return ""; } }
function lsSet(k,v){ try { localStorage.setItem(k,v); } catch(e){} }
function lsDel(k){ try { localStorage.removeItem(k); } catch(e){} }

const MODULOS = [
  { id:'dashboard', nome:'Dashboard' },
  { id:'listening', nome:'Listening' },
  { id:'community', nome:'Community' },
  { id:'relatorios', nome:'Relatórios' },
  { id:'calendario', nome:'Calendário' },
  { id:'upload', nome:'Upload' },
  { id:'config', nome:'Configurações' },
];

function Icon({name}){
  const p = {fill:'none', stroke:'currentColor', strokeWidth:1.7, strokeLinecap:'round', strokeLinejoin:'round'};
  const paths = {
    dashboard:<g {...p}><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></g>,
    listening:<g {...p}><circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="3"/><path d="M12 4v3"/></g>,
    community:<g {...p}><path d="M4 5h16v10H9l-4 4V5z"/></g>,
    relatorios:<g {...p}><path d="M6 3h8l4 4v14H6z"/><path d="M14 3v4h4"/><path d="M9 12h6M9 16h6"/></g>,
    calendario:<g {...p}><rect x="4" y="5" width="16" height="16" rx="2"/><path d="M4 9h16M8 3v4M16 3v4"/></g>,
    upload:<g {...p}><path d="M4 17v2a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-2"/><path d="M12 15V4M8 8l4-4 4 4"/></g>,
    config:<g {...p}><path d="M4 6h10M18 6h2M4 12h2M10 12h10M4 18h6M14 18h6"/><circle cx="16" cy="6" r="2"/><circle cx="8" cy="12" r="2"/><circle cx="12" cy="18" r="2"/></g>,
  };
  return <svg viewBox="0 0 24 24">{paths[name]||paths.community}</svg>;
}

function iniciais(txt){
  if(!txt) return "?";
  const t = txt.replace(/^@/,'').trim();
  const parts = t.split(/[\s.]+/).filter(Boolean);
  return ((parts[0]?.[0]||"") + (parts[1]?.[0]||"")).toUpperCase() || t.slice(0,2).toUpperCase();
}
function corSent(nome){
  return {Positivo:'var(--pos)',Negativo:'var(--neg)',Neutro:'var(--neu)','Dúvida':'var(--duv)',Bot:'var(--bot)','Político':'var(--pol)'}[nome] || '#ccc';
}

function Conectar({onConectar}){
  const [url, setUrl] = useState("");
  const [key, setKey] = useState("");
  const [erro, setErro] = useState("");
  function conectar(){
    const u = url.trim().replace(/\/+$/,''), k = key.trim();
    if(!u || !k){ setErro("Preencha os dois campos."); return; }
    if(!/^https:\/\/.+\.supabase\.co$/i.test(u)){ setErro("A Project URL parece incompleta. Ela deve ser algo como https://abcd1234.supabase.co"); return; }
    if(!window.supabase){ setErro("Aguarde a página carregar por completo e tente de novo."); return; }
    onConectar(u, k);
  }
  return (
    <div className="center">
      <div className="tile">M</div>
      <h1>Conectar o MUVUCA</h1>
      <p>Cole aqui as 2 chaves do seu Supabase. Você faz isso só uma vez — elas ficam salvas neste aparelho.</p>
      {erro && <div className="err">{erro}</div>}
      <div className="grp">
        <label>Project URL</label>
        <input value={url} onChange={e=>setUrl(e.target.value)} placeholder="https://abcd1234.supabase.co" />
        <div className="hint">No Supabase: Project Settings → API → "Project URL".</div>
      </div>
      <div className="grp">
        <label>Chave anon public</label>
        <input value={key} onChange={e=>setKey(e.target.value)} placeholder="eyJhbGciOi..." />
        <div className="hint">Mesma tela (API), o campo "anon public" (a chave longa). Não use a service_role.</div>
      </div>
      <button className="btn brand" onClick={conectar}>Conectar</button>
    </div>
  );
}

function Linha({it, cfg, onCampo}){
  const [aberto, setAberto] = useState(false);
  const [resp, setResp] = useState(it.resposta || "");
  const sent = cfg.sentimentos.find(s=>s.id===it.sentimento_id);
  const rede = cfg.redes.find(r=>r.id===it.rede_id);
  const prod = cfg.produtos.find(pp=>pp.id===it.produto_id);
  const edit = cfg.editorias.find(e=>e.id===it.editoria_id);
  return (
    <div className="row">
      <div className="av">{iniciais(it.autor)}</div>
      <div className="body">
        <div className="meta">
          <span className="who">{it.autor || 'Sem autor'}</span>
          {rede && <span className="net">· {rede.nome}</span>}
          {it.origem && <span className="tag">{it.origem}</span>}
          {prod && <span className="prod">· {prod.nome}</span>}
          {edit && <span className="tag">{edit.nome}</span>}
        </div>
        <div className="txt">{it.texto}</div>
        {it.link_conteudo && <a href={it.link_conteudo} target="_blank" style={{fontSize:12,color:'#185FA5'}}>ver conteúdo</a>}
        <div>
          <button className="btn" style={{marginTop:10,padding:'5px 10px'}} onClick={()=>setAberto(!aberto)}>
            {it.resposta ? 'Editar resposta' : 'Responder'}
          </button>
        </div>
        {aberto && (
          <div className="reply">
            <textarea value={resp} onChange={e=>setResp(e.target.value)} placeholder="Escreva a resposta sugerida…" />
            <div>
              <button className="btn brand" style={{padding:'6px 12px'}}
                onClick={async()=>{ await onCampo(it.id,'resposta',resp); await onCampo(it.id,'triagem','Respondido'); setAberto(false); }}>
                Salvar resposta
              </button>
            </div>
          </div>
        )}
      </div>
      <div className="ctrl">
        <div className="sentbox">
          <span className="dot" style={{background: corSent(sent?.nome)}}></span>
          <select value={it.sentimento_id || ''} onChange={e=>onCampo(it.id,'sentimento_id', e.target.value?Number(e.target.value):null)}>
            <option value="">Sentimento…</option>
            {cfg.sentimentos.map(s=><option key={s.id} value={s.id}>{s.nome}</option>)}
          </select>
        </div>
        <select value={it.triagem || 'Pendente'} onChange={e=>onCampo(it.id,'triagem', e.target.value)}>
          <option>Pendente</option>
          <option>Respondido</option>
          <option>Ignorar</option>
        </select>
      </div>
    </div>
  );
}

function Adicionar({cfg, clienteId, onAdd}){
  const vazio = {autor:'',texto:'',link_conteudo:'',origem:'Feed',rede_id:'',produto_id:'',editoria_id:'',sentimento_id:''};
  const [f, setF] = useState(vazio);
  const [salvando, setSalvando] = useState(false);
  const set = (k,v)=>setF(p=>({...p,[k]:v}));
  async function salvar(){
    if(!f.texto.trim()){ alert('Escreva o texto do comentário.'); return; }
    setSalvando(true);
    const ok = await onAdd({
      cliente_id: clienteId,
      autor: f.autor || null, texto: f.texto, link_conteudo: f.link_conteudo || null,
      origem: f.origem,
      rede_id: f.rede_id?Number(f.rede_id):null,
      produto_id: f.produto_id?Number(f.produto_id):null,
      editoria_id: f.editoria_id?Number(f.editoria_id):null,
      sentimento_id: f.sentimento_id?Number(f.sentimento_id):null,
      triagem:'Pendente'
    });
    setSalvando(false);
    if(ok) setF(vazio);
  }
  return (
    <div className="addwrap">
      <div style={{fontWeight:600,marginBottom:12}}>Adicionar interação</div>
      <div className="addgrid">
        <label className="field"><span>Autor</span><input value={f.autor} onChange={e=>set('autor',e.target.value)} placeholder="@usuario" /></label>
        <label className="field"><span>Rede</span>
          <select value={f.rede_id} onChange={e=>set('rede_id',e.target.value)}>
            <option value="">—</option>{cfg.redes.map(r=><option key={r.id} value={r.id}>{r.nome}</option>)}
          </select></label>
        <label className="field"><span>Origem</span>
          <select value={f.origem} onChange={e=>set('origem',e.target.value)}><option>Feed</option><option>DM</option></select></label>
        <label className="field"><span>Produto</span>
          <select value={f.produto_id} onChange={e=>set('produto_id',e.target.value)}>
            <option value="">—</option>{cfg.produtos.map(pp=><option key={pp.id} value={pp.id}>{pp.nome}</option>)}
          </select></label>
        <label className="field"><span>Editoria</span>
          <select value={f.editoria_id} onChange={e=>set('editoria_id',e.target.value)}>
            <option value="">—</option>{cfg.editorias.map(ed=><option key={ed.id} value={ed.id}>{ed.nome}</option>)}
          </select></label>
        <label className="field"><span>Sentimento</span>
          <select value={f.sentimento_id} onChange={e=>set('sentimento_id',e.target.value)}>
            <option value="">—</option>{cfg.sentimentos.map(s=><option key={s.id} value={s.id}>{s.nome}</option>)}
          </select></label>
      </div>
      <label className="field" style={{marginBottom:10}}><span>Texto do comentário / DM</span>
        <textarea value={f.texto} onChange={e=>set('texto',e.target.value)} style={{minHeight:56}} placeholder="Cole aqui o comentário…" /></label>
      <label className="field" style={{marginBottom:12}}><span>Link do conteúdo (opcional)</span>
        <input value={f.link_conteudo} onChange={e=>set('link_conteudo',e.target.value)} placeholder="https://…" /></label>
      <button className="btn brand" disabled={salvando} onClick={salvar}>{salvando?'Salvando…':'Adicionar'}</button>
    </div>
  );
}

function Community({cfg, interacoes, clienteId, onCampo, onAdd}){
  const [busca, setBusca] = useState('');
  const [fOrigem, setFOrigem] = useState('');
  const [fSent, setFSent] = useState('');
  const [mostrarAdd, setMostrarAdd] = useState(false);
  const nomeSent = it => cfg.sentimentos.find(s=>s.id===it.sentimento_id)?.nome;
  const total = interacoes.length;
  const pend = interacoes.filter(i=>i.triagem==='Pendente').length;
  const duv = interacoes.filter(i=>nomeSent(i)==='Dúvida').length;
  const neg = interacoes.filter(i=>nomeSent(i)==='Negativo').length;
  const vis = interacoes.filter(i=>{
    if(fOrigem && i.origem!==fOrigem) return false;
    if(fSent && String(i.sentimento_id)!==fSent) return false;
    if(busca){ const q=busca.toLowerCase(); if(!((i.texto||'').toLowerCase().includes(q) || (i.autor||'').toLowerCase().includes(q))) return false; }
    return true;
  });
  return (
    <div>
      <div className="head">
        <div><h1>Community management</h1><p>Comentários e DMs</p></div>
        <button className="btn brand" onClick={()=>setMostrarAdd(!mostrarAdd)}>{mostrarAdd?'Fechar':'+ Adicionar'}</button>
      </div>
      <div className="cards">
        <div className="card"><div className="lbl">Total</div><div className="val">{total}</div></div>
        <div className="card"><div className="lbl">Pendentes</div><div className="val">{pend}</div></div>
        <div className="card"><div className="lbl">Dúvidas</div><div className="val">{duv}</div></div>
        <div className="card"><div className="lbl">Negativos</div><div className="val">{neg}</div></div>
      </div>
      {mostrarAdd && <Adicionar cfg={cfg} clienteId={clienteId} onAdd={onAdd} />}
      <div className="filters">
        <input value={busca} onChange={e=>setBusca(e.target.value)} placeholder="Buscar por autor ou texto…" />
        <select value={fOrigem} onChange={e=>setFOrigem(e.target.value)}><option value="">Origem: todas</option><option>Feed</option><option>DM</option></select>
        <select value={fSent} onChange={e=>setFSent(e.target.value)}>
          <option value="">Sentimento: todos</option>
          {cfg.sentimentos.map(s=><option key={s.id} value={s.id}>{s.nome}</option>)}
        </select>
      </div>
      {vis.length===0
        ? <div className="empty">Nenhuma interação por aqui ainda. Clique em <b>+ Adicionar</b> para começar.</div>
        : vis.map(it=><Linha key={it.id} it={it} cfg={cfg} onCampo={onCampo} />)}
    </div>
  );
}

function Painel({creds, onSair}){
  const sb = useMemo(()=> window.supabase.createClient(creds.url, creds.key), [creds.url, creds.key]);
  const [status, setStatus] = useState('loading');
  const [erro, setErro] = useState('');
  const [clientes, setClientes] = useState([]);
  const [clienteId, setClienteId] = useState(null);
  const [cfg, setCfg] = useState({redes:[],produtos:[],editorias:[],sentimentos:[]});
  const [interacoes, setInteracoes] = useState([]);
  const [modulo, setModulo] = useState('community');

  useEffect(()=>{
    (async()=>{
      try{
        const {data,error} = await sb.from('clientes').select('*').order('id');
        if(error) throw error;
        setClientes(data||[]);
        if(data && data.length) setClienteId(data[0].id); else setStatus('ready');
      }catch(e){ setErro(e.message||String(e)); setStatus('erro'); }
    })();
  },[sb]);

  useEffect(()=>{ if(clienteId) carregar(clienteId); },[clienteId]);

  async function carregar(cid){
    setStatus('loading');
    try{
      const [r,p,e,s,i] = await Promise.all([
        sb.from('redes').select('*').eq('cliente_id',cid).order('nome'),
        sb.from('produtos').select('*').eq('cliente_id',cid).order('nome'),
        sb.from('editorias').select('*').eq('cliente_id',cid).order('nome'),
        sb.from('categorias_sentimento').select('*').eq('cliente_id',cid).order('id'),
        sb.from('interacoes').select('*').eq('cliente_id',cid).order('id',{ascending:false}),
      ]);
      for(const x of [r,p,e,s,i]) if(x.error) throw x.error;
      setCfg({redes:r.data||[],produtos:p.data||[],editorias:e.data||[],sentimentos:s.data||[]});
      setInteracoes(i.data||[]);
      setStatus('ready');
    }catch(ex){ setErro(ex.message||String(ex)); setStatus('erro'); }
  }

  async function onCampo(id, campo, valor){
    const {error} = await sb.from('interacoes').update({[campo]:valor}).eq('id',id);
    if(error){ alert('Erro ao salvar: '+error.message); return; }
    setInteracoes(prev=>prev.map(x=>x.id===id?{...x,[campo]:valor}:x));
  }
  async function onAdd(payload){
    const {data,error} = await sb.from('interacoes').insert(payload).select().single();
    if(error){ alert('Erro ao adicionar: '+error.message); return false; }
    setInteracoes(prev=>[data,...prev]);
    return true;
  }

  if(status==='erro'){
    return <div className="center">
      <h1>Não consegui conectar</h1>
      <p>{erro}</p>
      <p style={{fontSize:13}}>Confira se as chaves estão certas e se você rodou o texto do Supabase (Anexo A do guia).</p>
      <button className="btn" onClick={onSair}>Trocar as chaves</button>
    </div>;
  }

  const clienteNome = clientes.find(c=>c.id===clienteId)?.nome || '';

  return (
    <div className="app">
      <aside className="side">
        <div className="logo"><div className="tile">M</div><b>muvuca</b></div>
        <div className="switcher">
          <label>Cliente</label>
          <select value={clienteId||''} onChange={e=>setClienteId(Number(e.target.value))}>
            {clientes.map(c=><option key={c.id} value={c.id}>{c.nome}</option>)}
          </select>
        </div>
        {MODULOS.map(m=>(
          <button key={m.id} className={"nav"+(modulo===m.id?" on":"")} onClick={()=>setModulo(m.id)}>
            <Icon name={m.id}/>{m.nome}
          </button>
        ))}
        <div className="foot">
          <div className="who"><div className="av">AD</div><span style={{fontSize:13,color:'var(--muted)'}}>Adilson</span></div>
          <button className="linkbtn" onClick={onSair}>Trocar chaves do Supabase</button>
        </div>
      </aside>
      <main className="main">
        {status==='loading'
          ? <div className="empty">Carregando…</div>
          : modulo==='community'
            ? <Community cfg={cfg} interacoes={interacoes} clienteId={clienteId} onCampo={onCampo} onAdd={onAdd} />
            : <div>
                <div className="head"><div><h1>{MODULOS.find(m=>m.id===modulo).nome}</h1><p>{clienteNome}</p></div></div>
                <div className="soon">Módulo em construção — vem depois do Community, reaproveitando este mesmo esqueleto.</div>
              </div>}
      </main>
    </div>
  );
}

function App(){
  const [creds, setCreds] = useState(()=>({ url: lsGet(LS_URL), key: lsGet(LS_KEY) }));
  function conectar(url, key){ lsSet(LS_URL,url); lsSet(LS_KEY,key); setCreds({url,key}); }
  function sair(){ lsDel(LS_URL); lsDel(LS_KEY); setCreds({url:'',key:''}); }
  if(!creds.url || !creds.key) return <Conectar onConectar={conectar} />;
  return <Painel creds={creds} onSair={sair} />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
